    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        .links-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .profile-area {
            margin-bottom: 2rem;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
            border: 3px solid var(--border-color);
            background-color: var(--surface-color);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--primary);
            font-weight: 700;
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 0.25rem;
        }

        .profile-bio {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .link-item {
            display: block;
            width: 100%;
            padding: 1.25rem 1rem;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-item:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--primary);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .link-item:hover::before {
            opacity: 1;
        }

        .details-menu {
            margin-top: 1rem;
            width: 100%;
        }

        .summary-btn {
            display: block;
            width: 100%;
            padding: 1.25rem 1rem;
            background-color: transparent;
            border: 1px dashed var(--border-color, #4b5563);
            border-radius: 12px;
            color: var(--text-muted, #9ca3af);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            list-style: none; /* Hide default marker */
        }

        /* Hide summary marker for webkit */
        .summary-btn::-webkit-details-marker {
            display: none;
        }

        .summary-btn:hover {
            border-color: var(--text-color, #e5e7eb);
            color: var(--text-color, #e5e7eb);
            background-color: rgba(255, 255, 255, 0.02);
        }

        .details-menu[open] .summary-btn {
            margin-bottom: 1rem;
        }

        .link-item.link-item-small {
            padding: 1rem 1rem;
            font-size: 0.95rem;
        }
    </style>
</head>
