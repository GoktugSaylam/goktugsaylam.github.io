<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta tags for sharing -->
    <meta property="og:title" content="Göktuğ Saylam | Links">
    <meta property="og:description" content="All my projects and social profiles in one place.">
    <title>Göktuğ Saylam | Links</title>
    <!-- Link to global styles -->
    <link rel="stylesheet" href="/assets/css/style.css">
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="/assets/js/navigation.js"></script>
    
    <style>
        .links-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .profile-area {
            margin-bottom: 2rem;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
            border: 3px solid var(--border-color);
            background-color: var(--surface-color);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--primary);
            font-weight: 700;
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 0.25rem;
        }

        .profile-bio {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .link-item {
            display: block;
            width: 100%;
            padding: 1.25rem 1rem;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-item:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--primary);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .link-item:hover::before {
            opacity: 1;
        }
    </style>
</head>

<body>



    <!-- Links Section -->
    <section class="section" style="min-height: 80vh; display: flex; align-items: center;">
        <div class="container links-container">
            <!-- Profile Section -->
            <div class="profile-area">
                <div class="profile-img">GS</div>
                <h1 class="profile-name">Göktuğ Saylam</h1>
                <p class="profile-bio">Software Developer & Engineer</p>
            </div>

            <!-- Links List -->
            <ul class="links-list">
                <li>
                    <a href="/en/" class="link-item">
                        Go to Home Page (Portfolio)
                    </a>
                </li>
                <li>
                    <a href="/en/blog/" class="link-item">
                        My Tech Blog
                    </a>
                </li>
                <li>
                    <a href="https://github.com/GoktugSaylam" target="_blank" rel="noopener noreferrer" class="link-item">
                        GitHub Profile
                    </a>
                </li>
                <li>
                    <a href="https://linkedin.com/in/YOUR_LINKEDIN_HERE" target="_blank" rel="noopener noreferrer" class="link-item">
                        LinkedIn Profile
                    </a>
                </li>
                <li>
                    <a href="/cv.pdf" target="_blank" class="link-item">
                        View My Resume (CV)
                    </a>
                </li>
                <li>
                    <a href="mailto:email@example.com" class="link-item">
                        Email Me
                    </a>
                </li>
            </ul>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Göktuğ Saylam. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
